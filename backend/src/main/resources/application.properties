# Server
server.port=8080

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/namma_trips
spring.datasource.username=postgres
spring.datasource.password=harish1704
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=NammaTripsSecretKeyForJWTAuthenticationThatIsLongEnoughToBeSecure2024!
app.jwt.expiration-ms=86400000

# Gemini API
app.gemini.api-key=${GEMINI_API_KEY:your-gemini-api-key-here}
app.gemini.model=gemini-2.0-flash

# Cloudinary
app.cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:demo}
app.cloudinary.api-key=${CLOUDINARY_API_KEY:your-cloudinary-api-key}
app.cloudinary.api-secret=${CLOUDINARY_API_SECRET:your-cloudinary-api-secret}

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# Seed Data
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Logging
logging.level.com.nammatrips=DEBUG
logging.level.org.springframework.security=INFO
